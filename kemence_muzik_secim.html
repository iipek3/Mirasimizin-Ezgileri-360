<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Kemençe Hero | Şarkı Seçimi</title>
    <style>
        :root {
            --primary: #8B4513;
            --secondary: #D2B48C;
            --accent: #FFD700;
            --bg: #121212; 
            --card-bg: #1e1e1e;
        }

        body {
            margin: 0;
            padding: 0;
            background-color: var(--bg);
            font-family: 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            color: white;
            overflow-x: hidden;
        }

        .bg-gradient {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 400px;
            background: linear-gradient(180deg, #4b260b 0%, #121212 100%);
            z-index: -1;
        }

        .container {
            max-width: 900px;
            margin: 0 auto;
            padding: 40px 20px;
        }

        header {
            margin-bottom: 40px;
            display: flex;
            align-items: center;
            justify-content: space-between;
        }

        .back-btn {
            background: rgba(255, 255, 255, 0.1);
            border: none;
            color: white;
            padding: 10px 20px;
            border-radius: 20px;
            cursor: pointer;
            font-weight: bold;
            transition: 0.3s;
            text-decoration: none; /* Link gibi görünmemesi için */
            display: inline-block;
        }

        .back-btn:hover { background: rgba(255, 255, 255, 0.2); }

        h1 { font-size: 32px; margin: 0; color: var(--secondary); }

        .song-list {
            display: grid;
            gap: 15px;
        }

        .song-card {
            background: var(--card-bg);
            border-radius: 12px;
            padding: 15px 25px;
            display: flex;
            align-items: center;
            transition: 0.3s cubic-bezier(0.25, 0.8, 0.25, 1);
            cursor: pointer;
            border: 1px solid transparent;
            position: relative;
            overflow: hidden;
        }

        .song-card:hover {
            background: #282828;
            transform: scale(1.02);
            border-color: var(--secondary);
        }

        .song-art {
            width: 60px;
            height: 60px;
            background: var(--primary);
            border-radius: 8px;
            margin-right: 20px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 24px;
            box-shadow: 0 4px 10px rgba(0,0,0,0.3);
        }

        .song-details { flex-grow: 1; }

        .song-title {
            display: block;
            font-size: 18px;
            font-weight: bold;
            margin-bottom: 4px;
        }

        .song-meta {
            font-size: 14px;
            color: #b3b3b3;
            display: flex;
            gap: 15px;
        }

        .play-icon {
            font-size: 30px;
            color: var(--secondary);
            opacity: 0;
            transition: 0.3s;
        }

        .song-card:hover .play-icon {
            opacity: 1;
            transform: translateX(-10px);
        }

        footer {
            margin-top: 50px;
            text-align: center;
            color: #666;
            font-size: 14px;
        }
    </style>
</head>
<body>

    <div class="bg-gradient"></div>

    <div class="container">
        <header>
            <button class="back-btn" onclick="window.location.href='kemence_ekran.html'">⬅ Geri Dön</button>
            <h1>Türkü Seçimi</h1>
            <div style="width: 80px;"></div> 
        </header>

        <div class="song-list">
            <div class="song-card" onclick="selectSong('nevbahar')">
                <div class="song-art">🎻</div>
                <div class="song-details">
                    <span class="song-title">Erişti Nev-bahar Eyyâmı</span>
                    <div class="song-meta"></div>
                </div>
                <div class="play-icon">▶️</div>
            </div>
        </div>
    </div>

    <script>
        function selectSong(id, difficulty) {
            localStorage.setItem('selectedSong', id);
            localStorage.setItem('difficulty', difficulty);
            window.location.href = 'kemence_oyun.html';
        }
    </script>
</body>
</html>
